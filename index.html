<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Walk Tracker Pro</title>
    
    <!-- Подключаем стили Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        #map { height: 100vh; width: 100vw; z-index: 1; background: #ddd; }
        
        /* Панель статистики */
        #stats {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(255, 255, 255, 0.95);
            padding: 12px 24px;
            border-radius: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            text-align: center;
            min-width: 180px;
            backdrop-filter: blur(5px);
        }
        #stats h2 { margin: 0; font-size: 22px; color: #2c3e50; font-weight: 700; }
        #stats p { margin: 4px 0 0; font-size: 13px; color: #7f8c8d; text-transform: uppercase; letter-spacing: 1px; }
        
        /* Кнопка сброса */
        #reset-btn {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(255, 107, 107, 0.4);
            transition: transform 0.1s;
        }
        #reset-btn:active { transform: translateX(-50%) scale(0.95); }
    </style>
</head>
<body>

    <div id="stats">
        <h2 id="distance">0.00 км</h2>
        <p>Пройдено</p>
    </div>

    <div id="map"></div>
    <button id="reset-btn" onclick="resetTrack()">Сбросить</button>

    <!-- Подключаем скрипт Leaflet -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // 1. Инициализация карты
        const map = L.map('map', { zoomControl: false }).setView([55.7558, 37.6173], 13);

        // 2. Добавляем красивую цветную карту OpenStreetMap
        // Используем стандартный слой, но с правильными настройками для избежания 403 ошибки при работе через сервер
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors',
            maxZoom: 19
        }).addTo(map);

        // 3. Переменные для трека
        let path = []; 
        let polyline = L.polyline([], {
            color: '#3498db', // Яркий синий
            weight: 6,        // Толщина линии
            opacity: 0.8,     // Прозрачность
            lineCap: 'round'  // Закругленные края
        }).addTo(map);

        // Добавляем тень для линии, чтобы она выделялась на любой карте
        let polylineShadow = L.polyline([], {
            color: '#ffffff',
            weight: 10,
            opacity: 0.5,
            lineCap: 'round'
        }).addTo(map);

        let totalDistance = 0;
        let watchId = null;

        // Элементы UI
        const distEl = document.getElementById('distance');

        // 4. Функция расчета расстояния (Гаверсинусы)
        function getDistanceFromLatLonInM(lat1, lon1, lat2, lon2) {
            const R = 6371e3; 
            const dLat = deg2rad(lat2 - lat1);
            const dLon = deg2rad(lon2 - lon1);
            const a = 
                Math.sin(dLat/2) * Math.sin(dLat/2) +
                Math.cos(deg2rad(lat1)) * Math.cos(deg2rad(lat2)) * 
                Math.sin(dLon/2) * Math.sin(dLon/2); 
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)); 
            return R * c; 
        }

        function deg2rad(deg) {
            return deg * (Math.PI/180);
        }

        // 5. Запуск отслеживания
        function startTracking() {
            if (!navigator.geolocation) {
                alert("Геолокация не поддерживается");
                return;
            }

            const options = {
                enableHighAccuracy: true,
                timeout: 10000,
                maximumAge: 0
            };

            watchId = navigator.geolocation.watchPosition(success, error, options);
        }

        function success(position) {
            const lat = position.coords.latitude;
            const lng = position.coords.longitude;

            if (path.length === 0) {
                map.setView([lat, lng], 16);
            }

            const newPoint = [lat, lng];
            
            if (path.length > 0) {
                const lastPoint = path[path.length - 1];
                const dist = getDistanceFromLatLonInM(lastPoint[0], lastPoint[1], lat, lng);
                
                // Фильтр шума: игнорируем движения меньше 3 метров
                if (dist > 3) {
                    totalDistance += dist;
                    path.push(newPoint);
                    
                    // Обновляем обе линии (тень и основную)
                    polyline.setLatLngs(path);
                    polylineShadow.setLatLngs(path);
                }
            } else {
                path.push(newPoint);
                polyline.setLatLngs(path);
                polylineShadow.setLatLngs(path);
            }

            distEl.innerText = (totalDistance / 1000).toFixed(2) + " км";
        }

        function error(err) {
            console.warn(`ERROR(${err.code}): ${err.message}`);
        }

        function resetTrack() {
            if(confirm("Очистить текущий маршрут?")) {
                path = [];
                totalDistance = 0;
                polyline.setLatLngs([]);
                polylineShadow.setLatLngs([]);
                distEl.innerText = "0.00 км";
            }
        }

        // Запускаем
        startTracking();

    </script>
</body>
</html>
